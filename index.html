<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LASBOOK 상담 관리 시스템</title>
<meta property="og:type" content="website">
<meta property="og:title" content="LASBOOK 상담 관리 시스템">
<meta property="og:description" content="LASBOOK 독서 교육 전문 상담 예약 시스템">
<meta property="og:url" content="https://jocular-kitsune-54102c.netlify.app">
<meta property="og:image" content="https://jocular-kitsune-54102c.netlify.app/og-image.png">
<meta property="og:image:width" content="600">
<meta property="og:image:height" content="315">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="LASBOOK 상담 관리 시스템">
<meta name="twitter:description" content="LASBOOK 독서 교육 전문 상담 예약 시스템">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Noto Sans KR',sans-serif}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;


const SK = { subs: "lasbook-s7", br: "lasbook-b7", pw: "lasbook-p7", url: "lasbook-url7", notices: "lasbook-notices7" };
async function sGet(k) { try { const r = await new Promise(function(res) { try { var v = localStorage.getItem(k); res(v ? { value: v } : null); } catch(e) { res(null); } }); return r ? JSON.parse(r.value) : null; } catch { return null; } }
async function sSet(k, v) { try { await new Promise(function(res) { try { localStorage.setItem(k, JSON.stringify(v)); res(true); } catch(e) { res(null); } }); } catch (e) { console.error(e); } }

const T = {
  bg: "#1a1008", bgLight: "#1e1309",
  gold: "#ebcd7d", goldSoft: "#d7be87", goldWarm: "#d2b464",
  goldDim: "#a08745", goldBorder: "#8b6914",
  cream: "#f8f0e1", creamBorder: "#d2be96",
  danger: "#c25555", success: "#5a9e5a",
};

const DEF_BR = [
  { id: "singal", name: "신갈점", manager: "이정민", position: "지점장", phone: "010-8033-1110" },
  { id: "bundang", name: "분당점", manager: "경기련", position: "지점장", phone: "010-7644-5049" },
];
const DEF_PW = "0000";

const NETLIFY_URL = "https://jocular-kitsune-54102c.netlify.app";

function makeFormUrl(siteUrl, branchId) {
  if (siteUrl && siteUrl.trim()) {
    return siteUrl.trim().replace(/\/$/, "") + "#" + branchId;
  }
  // file:// 프로토콜인 경우 Netlify URL 사용 (로컬에서 열어도 QR이 정상 작동)
  if (window.location.protocol === "file:") {
    return NETLIFY_URL + "/#" + branchId;
  }
  return window.location.origin + window.location.pathname + "#" + branchId;
}

function uid() { return Date.now() + "_" + Math.random().toString(36).slice(2, 8); }

// ==========================================
// 앱 — 모든 상태를 여기서 관리
// ==========================================
function App() {
  const [screen, setScreen] = useState("demo");
  const [selBr, setSelBr] = useState(null);
  const [fromHash, setFromHash] = useState(false);
  const [branches, setBranches] = useState([]);
  const [subs, setSubs] = useState([]);
  const [adminPw, setAdminPw] = useState(DEF_PW);
  const [siteUrl, setSiteUrl] = useState("");
  const [notices, setNotices] = useState([]);
  const [ready, setReady] = useState(false);

  const load = useCallback(async () => {
    const [s, b, p, u, n] = await Promise.all([sGet(SK.subs), sGet(SK.br), sGet(SK.pw), sGet(SK.url), sGet(SK.notices)]);
    const loadedBranches = b || DEF_BR;
    setSubs(s || []); setBranches(loadedBranches); setAdminPw(p || DEF_PW); setSiteUrl(u || ""); setNotices(n || []);

    // 해시 라우팅: #singal → 해당 지점 폼 바로 열기
    const hash = window.location.hash.replace("#", "");
    if (hash) {
      const found = loadedBranches.find(br => br.id === hash);
      if (found) { setSelBr(found); setScreen("branch"); setFromHash(true); }
    }
    setReady(true);
  }, []);
  useEffect(() => { load(); }, [load]);

  // ── ref로 항상 최신 subs 유지 ──
  const subsRef = useRef(subs);
  subsRef.current = subs;

  // ── 데이터 조작: ref에서 읽고 → state 갱신 → ref 갱신 → 저장 ──
  const addSub = (entry) => {
    const next = [...subsRef.current, { ...entry, id: uid() }];
    setSubs(next);
    subsRef.current = next;
    sSet(SK.subs, next);
  };
  const editSub = (id, newData) => {
    const next = subsRef.current.map(s => s.id === id ? { ...s, ...newData } : s);
    setSubs(next);
    subsRef.current = next;
    sSet(SK.subs, next);
  };
  const deleteSub = (id) => {
    const next = subsRef.current.filter(s => s.id !== id);
    setSubs(next);
    subsRef.current = next;
    sSet(SK.subs, next);
  };
  const saveBr = (u) => { setBranches(u); sSet(SK.br, u); };
  const savePw = (p) => { setAdminPw(p); sSet(SK.pw, p); };
  const saveUrl = (u) => { setSiteUrl(u); sSet(SK.url, u); };
  const saveNotices = (n) => { setNotices(n); sSet(SK.notices, n); };

  // 백업: 모든 데이터를 JSON 파일로 다운로드
  const doBackup = () => {
    const data = { subs, branches, adminPw, siteUrl, notices, exportDate: new Date().toLocaleString("ko-KR"), version: "lasbook-v7" };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `lasbook_backup_${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  };

  // 복원: JSON 파일 업로드 후 1회 복원
  const doRestore = (file) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (!data.version || !data.version.startsWith("lasbook")) { alert("올바른 LASBOOK 백업 파일이 아닙니다."); return; }
        if (!confirm(`백업 일시: ${data.exportDate || "알 수 없음"}\n상담 ${(data.subs || []).length}건, 지점 ${(data.branches || []).length}개\n\n현재 데이터가 모두 교체됩니다. 복원하시겠습니까?`)) return;
        if (data.subs) { setSubs(data.subs); subsRef.current = data.subs; await sSet(SK.subs, data.subs); }
        if (data.branches) { setBranches(data.branches); await sSet(SK.br, data.branches); }
        if (data.adminPw) { setAdminPw(data.adminPw); await sSet(SK.pw, data.adminPw); }
        if (data.siteUrl !== undefined) { setSiteUrl(data.siteUrl); await sSet(SK.url, data.siteUrl); }
        if (data.notices) { setNotices(data.notices); await sSet(SK.notices, data.notices); }
        alert("복원이 완료되었습니다.");
      } catch (err) { alert("파일을 읽을 수 없습니다. 올바른 JSON 파일인지 확인해 주세요."); }
    };
    reader.readAsText(file);
  };

  if (!ready) return <Splash text="불러오는 중..." />;

  if (screen === "branch" && selBr) {
    return <BranchPage branch={selBr} adminPw={adminPw}
      subs={subs.filter(s => s.branchId === selBr.id)}
      notices={notices}
      onAdd={addSub} onEdit={editSub} onDelete={deleteSub}
      onBackup={doBackup} onRestore={doRestore}
      onRefresh={load}
      showBack={!fromHash}
      onExit={() => { setScreen("demo"); setSelBr(null); window.location.hash = ""; }} />;
  }
  if (screen === "admin") {
    return <AdminPage branches={branches} subs={subs} adminPw={adminPw} siteUrl={siteUrl}
      notices={notices} onSaveNotices={saveNotices}
      onEdit={editSub} onDelete={deleteSub}
      onSaveBr={saveBr} onSavePw={savePw} onSaveUrl={saveUrl}
      onBackup={doBackup} onRestore={doRestore}
      onBack={() => setScreen("demo")} onReload={load} />;
  }

  return (
    <div style={{ ...P.page, padding: "24px 16px" }}>
      <div style={P.box}>
        <Header title="LASBOOK 시스템" />
        <Div />
        <p style={{ fontSize: 13, color: T.goldSoft, fontWeight: 700, marginBottom: 12, textAlign: "center" }}>지점 선택</p>
        <p style={{ fontSize: 11, color: T.goldDim, textAlign: "center", marginBottom: 10 }}>실제로는 각 지점마다 별도 URL이 부여됩니다</p>
        {branches.map(b => (
          <button key={b.id} onClick={() => { setSelBr(b); setScreen("branch"); }} style={{ ...P.menuBtn, marginBottom: 8, padding: "14px 16px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: 16, fontWeight: 700 }}>{b.name}</span>
              <span style={{ color: T.goldDim, fontSize: 14 }}>→</span>
            </div>
            {(b.manager || b.phone) && (
              <div style={{ display: "flex", gap: 12, marginTop: 6, fontSize: 12, color: T.goldDim, flexWrap: "wrap" }}>
                {b.manager && <span>{b.manager}</span>}
                {b.position && <span>{b.position}</span>}
                {b.phone && <span>{b.phone}</span>}
              </div>
            )}
          </button>
        ))}
        <Div />
        <p style={{ fontSize: 13, color: T.goldSoft, fontWeight: 700, marginBottom: 12, textAlign: "center" }}>관리자 설정</p>
        <button onClick={() => setScreen("admin")} style={{ ...P.gold, width: "100%", padding: "14px", fontSize: 15 }}>설정</button>
      </div>
    </div>
  );
}

// ==========================================
// 관리 도구 (검색, 정렬, 일자)
// ==========================================
function AdminToolbar({ search, setSearch, sortBy, setSortBy, dateFrom, setDateFrom, dateTo, setDateTo }) {
  const [open, setOpen] = useState(false);
  return (
    <div style={{ marginBottom: 16 }}>
      <div style={{ position: "relative", marginBottom: 10 }}>
        <input type="text" placeholder="이름, 연락처, 자녀명 검색..." value={search} onChange={e => setSearch(e.target.value)}
          style={{ ...P.inp, fontSize: 13, paddingLeft: 36, background: "rgba(248,240,225,0.08)", color: T.goldSoft, border: `1px solid rgba(139,105,20,0.3)` }} />
        <span style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", fontSize: 15, color: T.goldDim }}>🔍</span>
        {search && <button onClick={() => setSearch("")} style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: T.goldDim, fontSize: 16, cursor: "pointer" }}>✕</button>}
      </div>
      <button onClick={() => setOpen(!open)} style={{ background: "none", border: `1px solid rgba(139,105,20,0.25)`, borderRadius: 6, color: T.goldDim, fontSize: 11, padding: "6px 12px", cursor: "pointer", fontFamily: "inherit", width: "100%", textAlign: "center" }}>
        {open ? "도구 닫기 ▲" : "정렬 · 일자 필터 ▼"}
      </button>
      {open && (
        <div style={{ marginTop: 10, background: "rgba(139,105,20,0.06)", border: `1px solid rgba(139,105,20,0.2)`, borderRadius: 8, padding: 14 }}>
          <p style={{ fontSize: 11, color: T.goldDim, margin: "0 0 6px", fontWeight: 700 }}>정렬</p>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14 }}>
            {[{ k: "newest", l: "최신순" }, { k: "oldest", l: "오래된순" }, { k: "name", l: "이름순" }, { k: "age", l: "나이순" }].map(s => (
              <button key={s.k} onClick={() => setSortBy(s.k)} style={{ padding: "6px 12px", borderRadius: 4, fontSize: 11, fontFamily: "inherit", cursor: "pointer", border: `1px solid ${T.goldBorder}`, background: sortBy === s.k ? T.goldBorder : "transparent", color: sortBy === s.k ? T.bg : T.goldWarm, fontWeight: 600 }}>{s.l}</button>
            ))}
          </div>
          <p style={{ fontSize: 11, color: T.goldDim, margin: "0 0 6px", fontWeight: 700 }}>일자 지정</p>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <input type="date" value={dateFrom} onChange={e => setDateFrom(e.target.value)} style={{ ...P.inp, fontSize: 12, padding: "8px", flex: 1, background: "rgba(248,240,225,0.08)", color: T.goldSoft, border: `1px solid rgba(139,105,20,0.3)` }} />
            <span style={{ color: T.goldDim, fontSize: 12 }}>~</span>
            <input type="date" value={dateTo} onChange={e => setDateTo(e.target.value)} style={{ ...P.inp, fontSize: 12, padding: "8px", flex: 1, background: "rgba(248,240,225,0.08)", color: T.goldSoft, border: `1px solid rgba(139,105,20,0.3)` }} />
          </div>
          {(dateFrom || dateTo) && <button onClick={() => { setDateFrom(""); setDateTo(""); }} style={{ background: "none", border: "none", color: T.danger, fontSize: 11, cursor: "pointer", fontFamily: "inherit", marginTop: 6, padding: 0 }}>일자 필터 초기화</button>}
        </div>
      )}
    </div>
  );
}

function filterAndSort(list, { search, sortBy, dateFrom, dateTo }) {
  let r = [...list];
  if (search.trim()) { const q = search.trim().toLowerCase(); r = r.filter(s => (s.parentName || "").toLowerCase().includes(q) || (s.phone || "").includes(q) || (s.childName || "").toLowerCase().includes(q)); }
  if (dateFrom || dateTo) {
    r = r.filter(s => {
      const m = (s.timestamp || "").match(/(\d{4})\.\s*(\d{1,2})\.\s*(\d{1,2})/);
      if (!m) return true;
      const d = `${m[1]}-${m[2].padStart(2, "0")}-${m[3].padStart(2, "0")}`;
      return (!dateFrom || d >= dateFrom) && (!dateTo || d <= dateTo);
    });
  }
  if (sortBy === "oldest") r.reverse();
  else if (sortBy === "name") r.sort((a, b) => (a.parentName || "").localeCompare(b.parentName || ""));
  else if (sortBy === "age") { const o = ["4세","5세","6세","7세","초1","초2","초3","초4","초5","초6","중등 이상"]; r.sort((a, b) => o.indexOf(a.childAge) - o.indexOf(b.childAge)); }
  return r;
}

// ==========================================
// 수정 가능한 카드
// ==========================================
function EditableCard({ s, onEdit, onDelete, showBr }) {
  const [editing, setEditing] = useState(false);
  const [deleting, setDeleting] = useState(false);
  const [memoEditing, setMemoEditing] = useState(false);
  const [memoText, setMemoText] = useState(s.memo || "");
  const [ef, setEf] = useState({});

  const startEdit = () => { setEditing(true); setDeleting(false); setMemoEditing(false); setEf({ parentName: s.parentName, phone: s.phone, childName: s.childName, childAge: s.childAge, status: s.status, memo: s.memo || "" }); };

  const doSave = () => {
    onEdit(s.id, ef);
    setEditing(false);
  };

  const doDelete = () => {
    if (!s.id) return;
    onDelete(s.id);
  };

  const saveMemo = () => {
    onEdit(s.id, { memo: memoText });
    setMemoEditing(false);
  };

  const cancelMemo = () => {
    setMemoText(s.memo || "");
    setMemoEditing(false);
  };

  // 수정 모드
  if (editing) {
    return (
      <div style={{ ...P.card, border: `1px solid ${T.goldBorder}` }}>
        <p style={{ fontSize: 12, color: T.gold, fontWeight: 700, margin: "0 0 10px" }}>수정 중</p>
        <div style={{ display: "grid", gap: 8 }}>
          <Mini label="보호자명" value={ef.parentName} onChange={v => setEf(p => ({ ...p, parentName: v }))} />
          <Mini label="연락처" value={ef.phone} onChange={v => setEf(p => ({ ...p, phone: v }))} />
          <Mini label="자녀명" value={ef.childName} onChange={v => setEf(p => ({ ...p, childName: v }))} />
          <div>
            <label style={{ fontSize: 11, color: T.goldDim, display: "block", marginBottom: 3 }}>나이</label>
            <select value={ef.childAge} onChange={e => setEf(p => ({ ...p, childAge: e.target.value }))} style={{ ...P.inp, fontSize: 13, padding: "8px" }}>
              {["4세","5세","6세","7세","초1","초2","초3","초4","초5","초6","중등 이상"].map(a => <option key={a} value={a}>{a}</option>)}
            </select>
          </div>
          <div>
            <label style={{ fontSize: 11, color: T.goldDim, display: "block", marginBottom: 3 }}>상태</label>
            <div style={{ display: "flex", gap: 6 }}>
              {["신규", "상담중", "완료"].map(st => (
                <button key={st} onClick={() => setEf(p => ({ ...p, status: st }))} style={{ padding: "6px 12px", borderRadius: 4, fontSize: 11, fontFamily: "inherit", cursor: "pointer", border: `1px solid ${T.goldBorder}`, background: ef.status === st ? T.goldBorder : "transparent", color: ef.status === st ? T.bg : T.goldWarm, fontWeight: 600 }}>{st}</button>
              ))}
            </div>
          </div>
          <div>
            <label style={{ fontSize: 11, color: T.goldDim, display: "block", marginBottom: 3 }}>메모</label>
            <textarea value={ef.memo} onChange={e => setEf(p => ({ ...p, memo: e.target.value }))} placeholder="메모를 입력하세요" rows={3}
              style={{ ...P.inp, fontSize: 13, padding: "8px 10px", resize: "vertical", minHeight: 60 }} />
          </div>
        </div>
        <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
          <button onClick={doSave} style={{ ...P.gold, flex: 1, padding: "8px", fontSize: 12 }}>저장</button>
          <button onClick={() => setEditing(false)} style={{ ...P.outline, flex: 1, padding: "8px", fontSize: 12 }}>취소</button>
        </div>
      </div>
    );
  }

  // 일반 카드
  return (
    <div style={{ ...P.card, position: "relative", overflow: "hidden" }}>
      {/* 삭제 확인 팝업 오버레이 */}
      {deleting && (
        <div style={{
          position: "absolute", top: 0, left: 0, right: 0, bottom: 0,
          background: "rgba(26,16,8,0.92)", display: "flex", flexDirection: "column",
          alignItems: "center", justifyContent: "center", zIndex: 10, borderRadius: 8,
        }}>
          <p style={{ fontSize: 14, color: T.gold, fontWeight: 700, margin: "0 0 4px" }}>{s.parentName}님</p>
          <p style={{ fontSize: 13, color: T.danger, margin: "0 0 16px" }}>삭제하시겠습니까?</p>
          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={doDelete} style={{ background: T.danger, border: "none", borderRadius: 6, color: "#fff", fontSize: 13, padding: "8px 20px", cursor: "pointer", fontFamily: "inherit", fontWeight: 700 }}>삭제</button>
            <button onClick={() => setDeleting(false)} style={{ background: "none", border: `1px solid ${T.goldBorder}`, borderRadius: 6, color: T.goldWarm, fontSize: 13, padding: "8px 20px", cursor: "pointer", fontFamily: "inherit" }}>취소</button>
          </div>
        </div>
      )}

      {/* 헤더 (상태 + 수정/삭제) */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
        <div style={{ display: "flex", gap: 6 }}>
          {showBr && <span style={{ ...P.badge, background: "#6b5a14" }}>{s.branchName}</span>}
          <span style={{ ...P.badge, background: s.status === "신규" ? "#914414" : s.status === "상담중" ? "#8b6914" : "#146914" }}>{s.status}</span>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={startEdit} style={{ background: "none", border: "none", color: T.goldWarm, fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>수정</button>
          <button onClick={() => setDeleting(true)} style={{ background: "none", border: "none", color: T.danger, fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>삭제</button>
        </div>
      </div>

      {/* 인적사항 */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "6px 16px" }}>
        <p style={{ fontSize: 14, color: T.goldDim, margin: 0 }}>보호자: <span style={{ color: T.goldSoft, fontWeight: 600 }}>{s.parentName}</span></p>
        <p style={{ fontSize: 14, color: T.goldDim, margin: 0 }}>연락처: <span style={{ color: T.goldSoft, fontWeight: 600 }}>{s.phone}</span></p>
        <p style={{ fontSize: 14, color: T.goldDim, margin: 0 }}>자녀: <span style={{ color: T.goldSoft }}>{s.childName || "-"}</span></p>
        <p style={{ fontSize: 14, color: T.goldDim, margin: 0 }}>나이: <span style={{ color: T.goldSoft }}>{s.childAge}</span></p>
      </div>
      {s.interests && <p style={{ color: T.goldDim, fontSize: 13, margin: "8px 0 0" }}>관심: <span style={{ color: T.goldWarm }}>{s.interests}</span></p>}

// ==========================================
// QR 코드 생성 (캔버스 기반, 외부 API 불필요)
// ==========================================
function QRCanvas({ data, size = 200 }) {
  const canvasRef = useRef(null);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    let script = document.querySelector('script[data-qr]');
    const render = () => {
      try {
        const qr = window.qrcode(0, "M");
        qr.addData(data);
        qr.make();
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        const mc = qr.getModuleCount();
        const cs = size / (mc + 8);
        const pad = (size - mc * cs) / 2;
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, size, size);
        ctx.fillStyle = "#000";
        for (let r = 0; r < mc; r++) for (let c = 0; c < mc; c++) {
          if (qr.isDark(r, c)) ctx.fillRect(pad + c * cs, pad + r * cs, cs + 0.5, cs + 0.5);
        }
        setLoaded(true);
      } catch (e) { console.error("QR error:", e); }
    };
    if (window.qrcode) { render(); return; }
    if (!script) {
      script = document.createElement("script");
      script.setAttribute("data-qr", "1");
      script.src = "https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js";
      script.onload = render;
      document.head.appendChild(script);
    } else { script.addEventListener("load", render); }
  }, [data, size]);

  return (
    <div style={{ textAlign: "center", display: "flex", justifyContent: "center", alignItems: "center", flexDirection: "column" }}>
      <canvas ref={canvasRef} width={size} height={size} style={{ borderRadius: 8, background: "#fff", display: "block" }} />
      {!loaded && <p style={{ fontSize: 11, color: T.goldDim, margin: "4px 0 0" }}>QR 생성 중...</p>}
    </div>
  );
}

// ==========================================
function CopyBtn({ text, label }) {
  const [copied, setCopied] = useState(false);
  const doCopy = async () => {
    try { await navigator.clipboard.writeText(text); setCopied(true); setTimeout(() => setCopied(false), 2000); }
    catch { /* fallback */ const ta = document.createElement("textarea"); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); setCopied(true); setTimeout(() => setCopied(false), 2000); }
  };
  return <button onClick={doCopy} style={{ ...P.outline, padding: "4px 10px", fontSize: 11, color: copied ? T.success : T.goldWarm, borderColor: copied ? T.success : T.goldBorder }}>{copied ? "복사됨 ✓" : (label || "복사")}</button>;
}

function SmsBtn({ phone, message }) {
  const href = `sms:${phone || ""}?body=${encodeURIComponent(message)}`;
  return <a href={href} style={{ ...P.outline, padding: "4px 10px", fontSize: 11, textDecoration: "none", display: "inline-block" }}>문자 보내기</a>;

  const cancel = () => { setEi(null); setAdding(false); setDelIdx(null); };
  const saveEdit = () => { if (!f.name.trim()) { alert("지점명 필수"); return; } const u = [...branches]; u[ei] = { ...u[ei], ...f }; onSave(u); setEi(null); };
  const saveAdd = () => { if (!f.name.trim()) { alert("지점명 필수"); return; } onSave([...branches, { id: f.name.replace(/\s/g, "") + "_" + Date.now(), ...f }]); setAdding(false); };
  const confirmDel = (i) => { onSave(branches.filter((_, x) => x !== i)); setDelIdx(null); setEi(null); };

                  <button onClick={() => setDelIdx(i)} style={{ background: "none", border: `1px solid ${T.danger}`, borderRadius: 4, color: T.danger, fontSize: 11, padding: "4px 10px", cursor: "pointer", fontFamily: "inherit" }}>삭제</button>
                </div>

              {/* 삭제 확인 */}
              {delIdx === i && (

                  <div style={{ display: "flex", gap: 8, justifyContent: "center" }}>
                    <button onClick={() => confirmDel(i)} style={{ background: T.danger, border: "none", borderRadius: 6, color: "#fff", fontSize: 12, padding: "6px 16px", cursor: "pointer", fontFamily: "inherit", fontWeight: 700 }}>삭제</button>
                    <button onClick={() => setDelIdx(null)} style={{ ...P.outline, padding: "6px 16px", fontSize: 12 }}>취소</button>

              <div style={{ display: "grid", gap: "4px 0", marginBottom: 12 }}>

                <p style={{ fontSize: 14, color: T.goldDim, margin: 0 }}>직책: <span style={{ color: T.goldSoft }}>{b.position || "-"}</span></p>

              <div style={{ height: 1, background: "rgba(139,105,20,0.2)", margin: "0 0 12px" }} />

  };
  return (
    <div style={{ ...P.card, marginTop: 16 }}>

function BranchDataView({ branches, subs, search, setSearch, sortBy, setSortBy, dateFrom, setDateFrom, dateTo, setDateTo, onEdit, onDelete }) {
  const [openBranches, setOpenBranches] = useState(() => {
    const init = {};
    branches.forEach(b => { init[b.name] = true; });
    return init;
  });
  const [showCounts, setShowCounts] = useState({});

  const toggleBranch = (name) => setOpenBranches(p => ({ ...p, [name]: !p[name] }));
  const getShowCount = (name) => showCounts[name] || 5;
  const setShowCount = (name, n) => setShowCounts(p => ({ ...p, [name]: n }));

  const allFiltered = filterAndSort(subs, { search, sortBy, dateFrom, dateTo });

  return (
    <>
      <AdminToolbar search={search} setSearch={setSearch} sortBy={sortBy} setSortBy={setSortBy} dateFrom={dateFrom} setDateFrom={setDateFrom} dateTo={dateTo} setDateTo={setDateTo} />
      <p style={{ fontSize: 12, color: T.goldDim, textAlign: "center", marginBottom: 12 }}>
        전체 {allFiltered.length}건{allFiltered.length !== subs.length ? ` (검색) / 총 ${subs.length}건` : ""}
      </p>

      {branches.map(b => {
        const brSubs = filterAndSort(subs.filter(s => s.branchName === b.name), { search, sortBy, dateFrom, dateTo });
        const isOpen = openBranches[b.name];
        const sc = getShowCount(b.name);
        return (
          <div key={b.id} style={{ marginBottom: 12 }}>
            {/* 지점 헤더 (아코디언 토글) */}
            <div onClick={() => toggleBranch(b.name)} style={{
              display: "flex", justifyContent: "space-between", alignItems: "center",
              padding: "14px 16px", cursor: "pointer", userSelect: "none",
              background: T.bgLight, border: `1px solid ${T.goldBorder}`, borderRadius: isOpen ? "8px 8px 0 0" : 8,
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontSize: 14, color: T.gold, transition: "transform 0.2s", transform: isOpen ? "rotate(90deg)" : "rotate(0deg)" }}>▶</span>
                <span style={{ fontSize: 15, color: T.gold, fontWeight: 700 }}>{b.name}</span>
                <span style={{ fontSize: 12, color: T.goldDim }}>({brSubs.length}건)</span>
              </div>
              <span style={{ fontSize: 12, color: T.goldDim }}>{b.manager || ""} {b.position || ""}</span>
            </div>

            {/* 지점 내용 (펼침) */}
            {isOpen && (
              <div style={{ border: `1px solid ${T.goldBorder}`, borderTop: "none", borderRadius: "0 0 8px 8px", padding: "12px" }}>
                {brSubs.length === 0 ? (
                  <p style={{ textAlign: "center", color: T.goldDim, fontSize: 13, padding: 16 }}>{search || dateFrom || dateTo ? "검색 결과 없음" : "접수 내역 없음"}</p>
                ) : (
                  <>
                    {brSubs.slice(0, sc).map(s => <EditableCard key={s.id} s={s} showBr={false} onEdit={onEdit} onDelete={onDelete} />)}
                    {brSubs.length > sc && (
                      <div style={{ display: "flex", gap: 8, justifyContent: "center", marginTop: 10, flexWrap: "wrap", alignItems: "center" }}>
                        <span style={{ fontSize: 12, color: T.goldDim }}>더 보기:</span>
                        {[10, 15, 20].filter(n => n > sc).map(n => (
                          <button key={n} onClick={() => setShowCount(b.name, n)} style={{ ...P.outline, padding: "5px 12px", fontSize: 11, color: T.goldWarm, borderColor: T.goldBorder }}>{n}명</button>
                        ))}
                        <button onClick={() => setShowCount(b.name, brSubs.length)} style={{ ...P.outline, padding: "5px 12px", fontSize: 11, color: T.gold, borderColor: T.gold }}>전체</button>
                      </div>
                    )}
                    {brSubs.length > 5 && sc > 5 && (
                      <div style={{ textAlign: "center", marginTop: 8 }}>
                        <button onClick={() => setShowCount(b.name, 5)} style={{ ...P.outline, padding: "5px 12px", fontSize: 11, color: T.goldDim, borderColor: T.goldBorder }}>접기</button>
                      </div>
                    )}
                  </>
                )}
              </div>
            )}
          </div>
        );
      })}
    </>
  );
}

function NoticeBoard({ notices, onSave }) {
  const [writing, setWriting] = useState(false);
  const [editId, setEditId] = useState(null);
  const [title, setTitle] = useState("");
  const [content, setContent] = useState("");
  const [delId, setDelId] = useState(null);

  const startWrite = () => { setWriting(true); setEditId(null); setTitle(""); setContent(""); };
  const startEdit = (n) => { setWriting(true); setEditId(n.id); setTitle(n.title); setContent(n.content); };
  const cancel = () => { setWriting(false); setEditId(null); setTitle(""); setContent(""); };

  const save = () => {
    if (!title.trim()) { alert("제목을 입력해 주세요."); return; }
    if (!content.trim()) { alert("내용을 입력해 주세요."); return; }
    if (editId) {
      const updated = notices.map(n => n.id === editId ? { ...n, title: title.trim(), content: content.trim(), editDate: new Date().toLocaleString("ko-KR") } : n);
      onSave(updated);
    } else {
      const newNotice = { id: uid(), title: title.trim(), content: content.trim(), date: new Date().toLocaleString("ko-KR") };
      onSave([newNotice, ...notices]);
    }
    cancel();
  };

  const doDelete = (id) => { onSave(notices.filter(n => n.id !== id)); setDelId(null); };

  return (
    <div>
      {/* 작성/수정 폼 */}
      {writing ? (
        <div style={{ ...P.card, border: `1px solid ${T.goldBorder}` }}>
          <p style={{ fontSize: 15, color: T.gold, fontWeight: 700, margin: "0 0 12px" }}>{editId ? "공지 수정" : "새 공지 작성"}</p>
          <div style={{ marginBottom: 10 }}>
            <label style={{ fontSize: 12, color: T.goldDim, display: "block", marginBottom: 4 }}>제목</label>
            <input value={title} onChange={e => setTitle(e.target.value)} placeholder="공지 제목" style={{ ...P.inp, fontSize: 14 }} />
          </div>
          <div style={{ marginBottom: 10 }}>
            <label style={{ fontSize: 12, color: T.goldDim, display: "block", marginBottom: 4 }}>내용</label>
            <textarea value={content} onChange={e => setContent(e.target.value)} placeholder="공지 내용을 입력하세요" rows={5}
              style={{ ...P.inp, fontSize: 13, padding: "10px 12px", resize: "vertical", minHeight: 80 }} />
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={save} style={{ ...P.gold, flex: 1, padding: "10px", fontSize: 13 }}>{editId ? "수정 완료" : "등록"}</button>
            <button onClick={cancel} style={{ ...P.outline, flex: 1, padding: "10px", fontSize: 13 }}>취소</button>
          </div>
        </div>
      ) : (
        <button onClick={startWrite} style={{ ...P.gold, width: "100%", padding: "14px", fontSize: 14, marginBottom: 12 }}>+ 새 공지 작성</button>
      )}

      {/* 공지 목록 (아코디언) */}
      {notices.length === 0 ? (
        <div style={{ textAlign: "center", padding: 40 }}><p style={{ color: T.goldDim, fontSize: 15 }}>등록된 공지가 없습니다</p></div>
      ) : notices.map(n => (
        <NoticeItem key={n.id} n={n} delId={delId} setDelId={setDelId} doDelete={doDelete} startEdit={startEdit} isAdmin />
      ))}
    </div>
  );
}

// ==========================================
// 전화번호 3-4-4
// ==========================================
function PhoneInput({ value, onChange }) {
  const parts = (value || "").split("-");
  const [p1, setP1] = useState(parts[0] || ""); const [p2, setP2] = useState(parts[1] || ""); const [p3, setP3] = useState(parts[2] || "");
  const r2 = useRef(null); const r3 = useRef(null);
  const up = (a, b, c) => { setP1(a); setP2(b); setP3(c); onChange(`${a}-${b}-${c}`); };
  return <div style={{ marginBottom: 14 }}><label style={P.label}>연락처 <span style={{ color: "#c9956b", fontSize: 11 }}>*필수</span></label><div style={{ display: "flex", alignItems: "center", gap: 6 }}>
    <input id="ph1" type="tel" inputMode="numeric" value={p1} onChange={e => { const v = e.target.value.replace(/\D/g, "").slice(0, 3); up(v, p2, p3); if (v.length === 3) r2.current?.focus(); }} placeholder="010" maxLength={3} style={{ background: T.cream, border: `1px solid ${T.creamBorder}`, borderRadius: 6, fontFamily: "inherit", fontSize: 16, color: T.bg, outline: "none", textAlign: "center", padding: "12px 4px", boxSizing: "border-box", width: "28%" }} />
    <span style={{ color: T.goldDim, fontSize: 18, fontWeight: 700 }}>-</span>
    <input ref={r2} type="tel" inputMode="numeric" value={p2} onChange={e => { const v = e.target.value.replace(/\D/g, "").slice(0, 4); up(p1, v, p3); if (v.length === 4) r3.current?.focus(); }} onKeyDown={e => { if (e.key === "Backspace" && !p2) document.getElementById("ph1")?.focus(); }} placeholder="0000" maxLength={4} style={{ background: T.cream, border: `1px solid ${T.creamBorder}`, borderRadius: 6, fontFamily: "inherit", fontSize: 16, color: T.bg, outline: "none", textAlign: "center", padding: "12px 4px", boxSizing: "border-box", width: "33%" }} />
    <span style={{ color: T.goldDim, fontSize: 18, fontWeight: 700 }}>-</span>
    <input ref={r3} type="tel" inputMode="numeric" value={p3} onChange={e => { const v = e.target.value.replace(/\D/g, "").slice(0, 4); up(p1, p2, v); }} onKeyDown={e => { if (e.key === "Backspace" && !p3) r2.current?.focus(); }} placeholder="0000" maxLength={4} style={{ background: T.cream, border: `1px solid ${T.creamBorder}`, borderRadius: 6, fontFamily: "inherit", fontSize: 16, color: T.bg, outline: "none", textAlign: "center", padding: "12px 4px", boxSizing: "border-box", width: "33%" }} />
  </div></div>;
}

function PwGate({ title, pw, onOk, onBack }) {
  const [v, setV] = useState(""); const [err, setErr] = useState(false); const ref = useRef(null);
  useEffect(() => { ref.current?.focus(); }, []);
  const check = () => { if (v === pw) onOk(); else { setErr(true); setV(""); setTimeout(() => setErr(false), 1500); } };
  return <div style={{ ...P.page, display: "flex", alignItems: "center", justifyContent: "center" }}><div style={{ ...P.box, padding: "48px 24px", textAlign: "center", maxWidth: 360 }}><button onClick={onBack} style={P.back}>← 뒤로</button><Header title={title} /><p style={{ fontSize: 14, color: T.goldSoft, marginBottom: 16 }}>비밀번호를 입력하세요</p><input ref={ref} type="password" inputMode="numeric" maxLength={10} placeholder="····" value={v} onChange={e => setV(e.target.value)} onKeyDown={e => e.key === "Enter" && check()} style={{ ...P.inp, textAlign: "center", maxWidth: 180, margin: "0 auto 16px", display: "block", fontSize: 22, letterSpacing: 10, padding: "14px", borderColor: err ? T.danger : T.creamBorder }} />{err && <p style={{ color: T.danger, fontSize: 13, marginBottom: 12 }}>비밀번호가 틀렸습니다</p>}<button onClick={check} style={{ ...P.gold, padding: "12px 40px", fontSize: 15 }}>확인</button></div></div>;
}

function Splash({ text }) { return <div style={{ ...P.page, display: "flex", alignItems: "center", justifyContent: "center" }}><div style={{ textAlign: "center" }}><div style={{ fontSize: 11, color: T.goldDim, letterSpacing: 6, marginBottom: 12 }}>L A S B O O K</div><div style={{ fontSize: 15, color: T.goldSoft }}>{text}</div></div></div>; }
function Header({ title, sub }) { return <div style={{ textAlign: "center", marginBottom: 20 }}><div style={{ fontSize: 11, color: T.goldDim, letterSpacing: 6, marginBottom: 6 }}>L A S B O O K</div>{title && <h1 style={{ fontSize: 20, color: T.gold, margin: "0 0 4px", fontWeight: 700 }}>{title}</h1>}{sub && <p style={{ fontSize: 13, color: T.goldDim, margin: 0 }}>{sub}</p>}</div>; }
function Div() { return <div style={{ height: 1, background: `linear-gradient(90deg, transparent, ${T.goldBorder}, transparent)`, margin: "20px 0" }} />; }
function Sec({ children }) { return <p style={{ fontSize: 15, fontWeight: 700, color: T.goldSoft, margin: "0 0 14px", textAlign: "center" }}>{children}</p>; }
function FI({ label, req, placeholder, value, onChange, type = "text" }) { return <div style={{ marginBottom: 14 }}><label style={P.label}>{label} {req && <span style={{ color: "#c9956b", fontSize: 11 }}>*필수</span>}</label><input type={type} placeholder={placeholder} value={value} onChange={e => onChange(e.target.value)} style={P.inp} /></div>; }

const P = {
  page: { minHeight: "100vh", background: `linear-gradient(170deg, ${T.bg} 0%, #110c05 50%, ${T.bg} 100%)`, fontFamily: "'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif", padding: "20px 16px", boxSizing: "border-box" },
  box: { maxWidth: 420, margin: "0 auto", background: `linear-gradient(180deg, ${T.bgLight} 0%, #150e06 100%)`, border: `1.5px solid ${T.goldBorder}`, borderRadius: 12, padding: "28px 22px", position: "relative" },
  label: { display: "block", fontSize: 13, fontWeight: 500, color: T.goldWarm, marginBottom: 6 },
  inp: { width: "100%", padding: "12px 14px", background: T.cream, border: `1px solid ${T.creamBorder}`, borderRadius: 6, fontFamily: "inherit", fontSize: 14, color: T.bg, outline: "none", boxSizing: "border-box" },
  sel: { width: "100%", padding: "12px 14px", background: T.cream, border: `1px solid ${T.creamBorder}`, borderRadius: 6, fontFamily: "inherit", fontSize: 14, color: T.bg, outline: "none", boxSizing: "border-box" },
  gold: { display: "inline-block", padding: "10px 24px", background: `linear-gradient(135deg, ${T.goldBorder}, ${T.goldWarm}, ${T.goldBorder})`, border: "none", borderRadius: 8, fontFamily: "inherit", fontSize: 14, fontWeight: 700, color: T.bg, cursor: "pointer", textDecoration: "none", textAlign: "center" },
  outline: { display: "inline-block", padding: "8px 20px", background: "transparent", border: `1px solid ${T.goldBorder}`, borderRadius: 6, color: T.goldWarm, fontFamily: "inherit", fontSize: 12, fontWeight: 500, cursor: "pointer", textDecoration: "none", textAlign: "center" },
  menuBtn: { display: "block", width: "100%", padding: "14px 16px", background: "rgba(139,105,20,0.08)", border: `1px solid ${T.goldBorder}`, borderRadius: 8, fontFamily: "inherit", fontSize: 14, fontWeight: 500, color: T.gold, cursor: "pointer", textAlign: "left" },
  back: { background: "none", border: "none", color: T.goldDim, fontSize: 13, cursor: "pointer", fontFamily: "inherit", padding: "4px 0", marginBottom: 8 },
  card: { background: "rgba(139,105,20,0.08)", border: `1px solid rgba(139,105,20,0.25)`, borderRadius: 8, padding: 16, marginBottom: 10 },
  badge: { display: "inline-block", padding: "3px 10px", borderRadius: 4, fontSize: 11, fontWeight: 600, color: T.cream },
};


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
